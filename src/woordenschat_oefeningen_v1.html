<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woordenschat – Inburgering Signaalwoorden</title>
<style>
:root {
  --blue:#1a4f8a; --blue-l:#e8f0fb;
  --green:#2e7d32; --green-l:#e8f5e9;
  --red:#c62828;   --red-l:#fdecea;
  --orange:#e65100; --yellow:#f9a825;
  --bg:#f0f2f5; --card:#fff; --text:#1a1a1a; --muted:#666;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HUD */
header{background:var(--blue);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
header h1{font-size:18px;font-weight:700;}
header p{font-size:12px;opacity:.8;margin-top:2px;}
.hud{display:flex;gap:10px;align-items:center;}
.lang-control{background:rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;display:flex;flex-direction:column;gap:3px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
.lang-control select{border:none;border-radius:6px;padding:4px 6px;font-weight:700;color:var(--blue);background:#fff;}
.hud-item{background:rgba(255,255,255,.15);border-radius:8px;padding:6px 14px;text-align:center;min-width:64px;}
.hud-item .val{font-size:22px;font-weight:800;line-height:1;}
.hud-item .lbl{font-size:10px;opacity:.8;text-transform:uppercase;letter-spacing:.5px;}
#xp-bar-wrap{background:rgba(255,255,255,.2);height:5px;border-radius:3px;overflow:hidden;width:100px;margin-top:3px;}
#xp-bar{height:100%;background:var(--yellow);border-radius:3px;width:0%;transition:width .4s;}

/* LAYOUT */
main{max-width:700px;margin:0 auto;padding:24px 16px 80px;}

/* MODE NAV */
.mode-nav{display:flex;gap:6px;margin-bottom:20px;background:#fff;border-radius:var(--r);padding:6px;box-shadow:0 2px 6px rgba(0,0,0,.08);flex-wrap:wrap;}
.mode-btn{flex:1;padding:9px 6px;border:none;border-radius:8px;background:transparent;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .2s;text-align:center;white-space:nowrap;}
.mode-btn.active{background:var(--blue);color:#fff;}
.mode-btn:hover:not(.active){background:var(--blue-l);color:var(--blue);}

/* CARD */
.card{background:var(--card);border-radius:var(--r);padding:26px 22px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:16px;}
.round-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
.topic-tag{display:inline-block;background:var(--blue-l);color:var(--blue);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}

/* PROGRESS DOTS */
.progress-dots{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.dot{width:10px;height:10px;border-radius:50%;background:#ddd;transition:background .3s;}
.dot.ok{background:var(--green);}
.dot.err{background:var(--red);}
.dot.cur{background:var(--blue);transform:scale(1.3);}

/* ─── VERTICAL PRACTICE ─── */
.all-practice #mode-type,
.all-practice #mode-scramble,
.all-practice #mode-match,
.all-practice #mode-build{border-top:1px solid #eee;margin-top:28px;padding-top:24px;}

/* ─── FILL IN THE BLANK ─── */
.sentence{font-size:21px;line-height:1.55;text-align:center;margin-bottom:6px;}
.hint-box{font-size:13px;color:var(--muted);text-align:center;font-style:italic;margin-bottom:18px;}
.blank-options{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.word-btn{padding:10px 20px;border:2px solid #ccc;border-radius:8px;background:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--text);position:relative;}
.word-btn:hover:not(.locked){border-color:var(--blue);background:var(--blue-l);color:var(--blue);}
.word-btn.correct{border-color:var(--green);background:var(--green-l);color:var(--green);}
.word-btn.wrong  {border-color:var(--red);background:var(--red-l);color:var(--red);}
.word-btn.reveal {border-color:var(--green);background:var(--green-l);color:var(--green);}
.word-btn.locked {cursor:default;}

/* ─── TYPE THE WORD ─── */
.type-prompt{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px;}
.type-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:18px;}
.type-wrap{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;}
#type-input{font-size:18px;padding:10px 16px;border:2px solid #ccc;border-radius:8px;width:260px;text-align:center;outline:none;transition:border-color .2s;}
#type-input:focus{border-color:var(--blue);}
#type-input.correct{border-color:var(--green);background:var(--green-l);}
#type-input.wrong  {border-color:var(--red);background:var(--red-l);}
.type-submit-btn{padding:10px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
.type-submit-btn:hover{background:#163f70;}
.type-submit-btn:disabled{opacity:.4;cursor:default;}
.type-feedback{margin-top:12px;text-align:center;font-size:14px;min-height:20px;}
.type-feedback.ok {color:var(--green);font-weight:700;}
.type-feedback.err{color:var(--red);}
.type-hint-btn{display:block;margin:8px auto 0;background:none;border:none;color:var(--blue);font-size:13px;cursor:pointer;text-decoration:underline;}

/* ─── SCRAMBLE ─── */
.scramble-english{font-size:19px;font-weight:700;text-align:center;margin-bottom:6px;line-height:1.5;background:var(--blue-l);border-radius:8px;padding:14px;}
.scramble-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:18px;}
.letter-slots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;min-height:48px;}
.letter-tile{min-width:40px;height:48px;border:2px solid #ccc;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;cursor:pointer;user-select:none;background:#fff;transition:all .15s;padding:0 6px;}
.letter-tile:hover:not(.used):not(.locked){border-color:var(--blue);background:var(--blue-l);}
.letter-tile.used{background:#eee;color:#aaa;border-color:#ddd;cursor:default;}
.letter-tile.locked{cursor:default;}
.answer-slots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;min-height:48px;}
.answer-slot{min-width:40px;height:48px;border:2px dashed #ccc;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;cursor:pointer;color:var(--text);background:#fafafa;padding:0 6px;}
.answer-slot.filled{border-style:solid;border-color:var(--blue);background:var(--blue-l);color:var(--blue);}
.answer-slot.correct-slot{border-color:var(--green);background:var(--green-l);color:var(--green);}
.answer-slot.wrong-slot  {border-color:var(--red);background:var(--red-l);color:var(--red);}
.scramble-actions{display:flex;gap:8px;justify-content:center;}
.scr-btn{padding:9px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid var(--blue);color:var(--blue);background:#fff;}
.scr-btn.primary{background:var(--blue);color:#fff;}
.scr-btn:disabled{opacity:.4;cursor:default;}

/* ─── MATCHING ─── */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.match-col{display:flex;flex-direction:column;gap:10px;}
.match-item{padding:12px 14px;border:2px solid #ddd;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;background:#fff;user-select:none;}
.match-item:hover:not(.locked):not(.matched-correct){border-color:var(--blue);background:var(--blue-l);}
.match-item.selected{border-color:var(--blue);background:var(--blue-l);color:var(--blue);}
.match-item.matched-correct{border-color:var(--green);background:var(--green-l);color:var(--green);cursor:default;}
.match-item.flash-wrong{border-color:var(--red);background:var(--red-l);color:var(--red);}
.match-item.locked{cursor:default;}

/* ─── SENTENCE BUILD ─── */
.sb-english{font-size:17px;line-height:1.5;text-align:center;margin-bottom:6px;background:var(--blue-l);border-radius:8px;padding:14px;}
.sb-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:14px;}
.sb-drop-zone{min-height:52px;border:2px dashed #ccc;border-radius:8px;padding:8px;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center;justify-content:center;}
.word-chip{padding:8px 14px;border:2px solid #ccc;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;background:#fff;user-select:none;transition:all .15s;}
.word-chip:hover:not(.locked){border-color:var(--blue);background:var(--blue-l);}
.word-chip.in-zone{background:var(--blue-l);border-color:var(--blue);color:var(--blue);}
.word-chip.locked{cursor:default;}
.word-chip.correct-chip{border-color:var(--green);background:var(--green-l);color:var(--green);}
.word-chip.wrong-chip  {border-color:var(--red);background:var(--red-l);color:var(--red);}
.sb-word-bank{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px;}
.sb-result{font-size:13px;text-align:center;min-height:18px;font-weight:600;}
.sb-result.ok {color:var(--green);}
.sb-result.err{color:var(--red);}

/* ─── NEXT BTN ─── */
#next-btn{display:none;margin:20px auto 0;background:var(--blue);color:#fff;border:none;padding:13px 36px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;}
#next-btn:hover{background:#163f70;}
#next-btn.show{display:block;}

/* ─── ROUND END ─── */
#round-end{display:none;text-align:center;padding:20px;}
#round-end.show{display:block;}
#round-end .big-emoji{font-size:64px;margin-bottom:12px;}
#round-end h2{font-size:24px;font-weight:800;margin-bottom:8px;}
#round-end p{color:var(--muted);margin-bottom:20px;}
.missed-list{background:var(--red-l);border-radius:10px;padding:16px;text-align:left;margin-bottom:20px;font-size:14px;}
.missed-list h4{color:var(--red);margin-bottom:8px;}
.missed-list li{margin-bottom:4px;}
.end-btn{padding:12px 28px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin:4px;border:none;}
.end-btn.primary{background:var(--blue);color:#fff;}
.end-btn.secondary{background:#fff;color:var(--blue);border:2px solid var(--blue);}

/* ─── WORD INFO POPUP ─── */
#popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;display:none;align-items:center;justify-content:center;padding:20px;}
#popup-overlay.show{display:flex;}
#popup-card{background:#fff;border-radius:16px;max-width:480px;width:100%;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.25);animation:popIn .18s ease;}
@keyframes popIn{from{transform:scale(.88);opacity:0;}to{transform:scale(1);opacity:1;}}
.popup-top{background:var(--blue);color:#fff;padding:16px 18px 14px;display:flex;justify-content:space-between;align-items:flex-start;}
.popup-word{font-size:26px;font-weight:800;line-height:1.1;}
.popup-tag{font-size:12px;background:rgba(255,255,255,.2);border-radius:20px;padding:3px 10px;margin-top:6px;display:inline-block;font-weight:600;}
.popup-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;opacity:.8;padding:0;line-height:1;flex-shrink:0;}
.popup-close:hover{opacity:1;}
.popup-body{padding:18px;}
.popup-translation{font-size:15px;color:var(--muted);font-style:italic;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #eee;}
.popup-parts-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
.popup-parts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.popup-part{border-radius:8px;padding:8px 12px;min-width:80px;}
.popup-part .piece{font-size:17px;font-weight:800;display:block;}
.popup-part .role{font-size:10px;text-transform:uppercase;letter-spacing:.4px;opacity:.65;display:block;margin-top:1px;}
.popup-part .meaning{font-size:12px;display:block;margin-top:3px;line-height:1.3;}
.part-particle{background:#fff3e0;border:1px solid #ffb74d;}
.part-prefix {background:#ede7f6;border:1px solid #9575cd;}
.part-base   {background:#e3f2fd;border:1px solid #64b5f6;}
.part-suffix {background:#fce4ec;border:1px solid #f48fb1;}
.part-prep   {background:#e8f5e9;border:1px solid #81c784;}
.part-word   {background:#f5f5f5;border:1px solid #bdbdbd;}
.popup-tip{background:#fffde7;border:1px solid #f9a825;border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.6;}
.popup-tip strong{color:var(--orange);}

/* ─── FEEDBACK FLASH ─── */
#feedback-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.5);font-size:60px;pointer-events:none;opacity:0;transition:transform .15s,opacity .15s;z-index:500;}
#feedback-flash.show{transform:translate(-50%,-50%) scale(1);opacity:1;}

/* ─── STREAK TOAST ─── */
#streak-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--orange);color:#fff;padding:10px 24px;border-radius:30px;font-weight:800;font-size:15px;transition:transform .3s;z-index:300;pointer-events:none;}
#streak-toast.show{transform:translateX(-50%) translateY(0);}

/* ─── CONFETTI ─── */
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;z-index:600;animation:confettiFall 1.2s ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* INTRO */
#intro{text-align:center;padding:8px 0 20px;}
#intro h2{font-size:20px;font-weight:700;margin-bottom:8px;}
#intro p{font-size:14px;color:var(--muted);max-width:420px;margin:0 auto 20px;line-height:1.6;}
.start-btn{background:var(--blue);color:#fff;border:none;padding:13px 32px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;}
.start-btn:hover{background:#163f70;}
.info-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;font-style:italic;}
</style>
</head>
<body>

<!-- WORD INFO POPUP -->
<div id="popup-overlay" onclick="closePopupOnOverlay(event)">
  <div id="popup-card">
    <div class="popup-top">
      <div>
        <div class="popup-word" id="pu-word"></div>
        <div class="popup-tag" id="pu-tag"></div>
      </div>
      <button class="popup-close" onclick="closePopup()">✕</button>
    </div>
    <div class="popup-body">
      <div class="popup-translation" id="pu-translation"></div>
      <div class="popup-parts-label">Woordopbouw</div>
      <div class="popup-parts" id="pu-parts"></div>
      <div class="popup-tip" id="pu-tip"></div>
    </div>
  </div>
</div>

<div id="feedback-flash"></div>
<div id="streak-toast"></div>

<header>
  <div>
    <h1>🧠 Woordenschat Oefeningen</h1>
    <p>Inburgering signaalwoorden · Klik elk Nederlands woord voor uitleg</p>
  </div>
  <div class="hud">
    <label class="lang-control">Hulp taal
      <select id="support-lang" onchange="setSupportLang(this.value)">
        <option value="en">English</option>
        <option value="pt" selected>Português</option>
      </select>
    </label>
    <div class="hud-item">
      <div class="val" id="hud-xp">0</div>
      <div class="lbl">XP</div>
      <div id="xp-bar-wrap"><div id="xp-bar"></div></div>
    </div>
    <div class="hud-item">
      <div class="val" id="hud-streak">0🔥</div>
      <div class="lbl">Streak</div>
    </div>
  </div>
</header>

<main>
  <div class="mode-nav">
    <button class="mode-btn active"  onclick="setMode('fill',this)">✏️ Invullen</button>
    <button class="mode-btn"         onclick="setMode('type',this)">⌨️ Typen</button>
    <button class="mode-btn"         onclick="setMode('scramble',this)">🔀 Puzzel</button>
    <button class="mode-btn"         onclick="setMode('match',this)">🔗 Koppelen</button>
    <button class="mode-btn"         onclick="setMode('build',this)">🧩 Zinsbouw</button>
    <button class="mode-btn"         onclick="setMode('all',this)">📚 Alles</button>
  </div>

  <div class="card" id="game-card">

    <!-- INTRO -->
    <div id="intro" style="display:none"></div>

    <!-- FILL IN THE BLANK -->
    <div id="mode-fill" style="display:none">
      <div class="round-label" id="fill-label"></div>
      <div class="progress-dots" id="fill-dots"></div>
      <div class="topic-tag" id="fill-topic"></div>
      <div class="sentence" id="fill-sentence"></div>
      <div class="hint-box" id="fill-hint"></div>
      <button class="type-hint-btn" id="fill-trans-btn">🇬🇧 Toon vertaling</button>
      <div class="hint-box" id="fill-translation" style="display:none;font-style:normal;color:var(--green);margin-top:4px;"></div>
      <div class="blank-options" id="fill-options"></div>
    </div>

    <!-- TYPE THE WORD -->
    <div id="mode-type" style="display:none">
      <div class="round-label" id="type-label"></div>
      <div class="progress-dots" id="type-dots"></div>
      <div class="topic-tag" id="type-topic"></div>
      <div class="type-prompt" id="type-prompt"></div>
      <div class="type-sub" id="type-sub"></div>
      <div class="type-wrap">
        <input id="type-input" type="text" placeholder="Typ hier…" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="type-submit-btn" id="type-submit-btn" onclick="checkType()">OK</button>
      </div>
      <div class="type-feedback" id="type-feedback"></div>
      <button class="type-hint-btn" id="type-hint-btn" onclick="showTypeHint()" style="display:none">💡 Toon hint</button>
    </div>

    <!-- SCRAMBLE -->
    <div id="mode-scramble" style="display:none">
      <div class="round-label" id="scr-label"></div>
      <div class="progress-dots" id="scr-dots"></div>
      <div class="topic-tag" id="scr-topic"></div>
      <div class="scramble-english" id="scr-english"></div>
      <div class="scramble-sub" id="scr-sub"></div>
      <div class="answer-slots" id="scr-answer"></div>
      <div class="letter-slots" id="scr-letters"></div>
      <div class="scramble-actions">
        <button class="scr-btn" onclick="clearScramble()">↩ Wis</button>
        <button class="scr-btn primary" id="scr-check-btn" onclick="checkScramble()">Controleer</button>
      </div>
      <div class="type-feedback" id="scr-feedback" style="margin-top:10px;"></div>
    </div>

    <!-- MATCHING -->
    <div id="mode-match" style="display:none">
      <div class="round-label" id="match-label">Koppel het Nederlandse woord aan de juiste vertaling</div>
      <div class="progress-dots" id="match-dots"></div>
      <div class="match-grid">
        <div class="match-col" id="match-left"></div>
        <div class="match-col" id="match-right"></div>
      </div>
    </div>

    <!-- SENTENCE BUILD -->
    <div id="mode-build" style="display:none">
      <div class="round-label" id="build-label"></div>
      <div class="progress-dots" id="build-dots"></div>
      <div class="sb-english" id="build-english"></div>
      <div class="sb-sub">Zet de Nederlandse woorden in de juiste volgorde</div>
      <div class="sb-drop-zone" id="build-zone"></div>
      <div class="sb-word-bank" id="build-bank"></div>
      <div class="sb-result" id="build-result"></div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:8px;">
        <button class="scr-btn" onclick="clearBuild()">↩ Wis</button>
        <button class="scr-btn primary" onclick="checkBuild()">Controleer</button>
      </div>
    </div>

    <button id="next-btn" onclick="nextQ()">Volgende →</button>
  </div>

  <!-- ROUND END -->
  <div class="card" id="round-end">
    <div class="big-emoji" id="end-emoji"></div>
    <h2 id="end-title"></h2>
    <p id="end-sub"></p>
    <div class="missed-list" id="missed-list" style="display:none">
      <h4>📌 Onthoud deze woorden:</h4>
      <ul id="missed-items"></ul>
    </div>
    <button class="end-btn primary" onclick="startRound()">Volgende ronde ▶</button>
    <button class="end-btn secondary" onclick="replayMissed()">🔁 Herhaal gemiste woorden</button>
  </div>
</main>

<script>
// ══════════════════════════════════════════════════════════════
// VOCABULARY DATA
// Loaded from vocab.json during startup.
// ══════════════════════════════════════════════════════════════
let vocab = [];

// ══════════════════════════════════════════════════════════════
// POPUP
// ══════════════════════════════════════════════════════════════
function openPopup(nl) {
  const item = vocab.find(v => v.nl === nl);
  if (!item || !item.info) return;
  const {info, tag} = item;
  document.getElementById('pu-word').textContent = item.nl;
  document.getElementById('pu-tag').textContent = tag || '';
  document.getElementById('pu-translation').textContent = ui('flag') + ' ' + supportInfoTranslation(item);
  document.querySelector('.popup-parts-label').textContent = ui('wordParts');
  const partsEl = document.getElementById('pu-parts');
  partsEl.innerHTML = '';
  (info.parts || []).forEach(p => {
    const el = document.createElement('div');
    el.className = 'popup-part ' + (p.cls || 'part-word');
    el.innerHTML = `<span class="piece">${p.piece}</span><span class="role">${p.role}</span><span class="meaning">${p.meaning}</span>`;
    partsEl.appendChild(el);
  });
  document.getElementById('pu-tip').innerHTML = supportTip(item);

}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('show');
}

function closePopupOnOverlay(e) {
  if (e.target === document.getElementById('popup-overlay')) closePopup();
}

const $ = id => document.getElementById(id);
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b; }
function normalize(s){ return s.trim().toLowerCase().replace(/[.'?,!–]/g,''); }
function ui(key){ return (UI[supportLang] && UI[supportLang][key]) || UI.en[key] || key; }
function supportMeaning(item){ return supportLang === 'pt' ? (item.pt || PT_MEANINGS[item.nl] || item.en) : item.en; }
function supportSentence(item){ return supportLang === 'pt' ? (item.sentence && item.sentence.pt) || supportMeaning(item) : ((item.sentence && item.sentence.en) || item.en); }
function supportFill(item){ return supportLang === 'pt' ? (item.fill_pt || supportMeaning(item)) : (item.fill_en || item.en); }
function supportInfoTranslation(item){ return supportLang === 'pt' ? ((item.info && item.info.translation_pt) || supportMeaning(item)) : ((item.info && item.info.translation) || item.en); }
function supportTip(item){ return supportLang === 'pt' ? (item.info && item.info.tip_pt) || `<strong>${ui('genericTip')}:</strong> associe <strong>${item.nl}</strong> a <em>${supportMeaning(item)}</em> em frases formais.` : ((item.info && item.info.tip) || ''); }
function setSupportLang(lang){ supportLang = lang === 'pt' ? 'pt' : 'en'; if ($('support-lang')) $('support-lang').value = supportLang; if (vocab.length) { if (mode === 'match') startMatch(); else showQ(); } }
function oneWordAnswer(item){ return (item.answer||item.nl).trim().split(/\s+/).pop(); }
function oneWordDistractors(item){ return (item.dis||[]).map(d=>d.trim().split(/\s+/).pop()).filter(Boolean).slice(0,3); }
function blankPrompt(item, blank='_______'){
  const text=item.fill||'';
  if(text.includes('___')) return text.replace(/_+/g, blank);
  return text.replace(item.answer, blank).replace(oneWordAnswer(item), blank);
}

function buildDots(id,total,cur){
  const c=$(id); c.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<cur?' ok':i===cur?' cur':'');
    c.appendChild(d);
  }
}
function markDot(id,idx,cls){
  const dots=$(id).querySelectorAll('.dot');
  if(dots[idx]) dots[idx].className='dot '+cls;
  if(dots[idx+1]) dots[idx+1].className='dot cur';
}

// GAME FLOW

function setMode(m, btn){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  startRound();
}

function showIntro(){
  ['fill','type','scramble','match','build'].forEach(m=>$('mode-'+m).style.display='none');
  $('intro').style.display='block';
  $('round-end').classList.remove('show');
  $('next-btn').classList.remove('show');
}

function startRound(){
  $('round-end').classList.remove('show');
  $('game-card').style.display='block';
  $('intro').style.display='none';
  $('next-btn').classList.remove('show');
  missedWords=[]; qIndex=0;
  roundQueue=shuffle(vocab).slice(0,ROUND_SIZE);
  if(mode==='match') startMatch();
  else showQ();
}

function replayMissed(){
  const pool=[...missedWords];
  if(!pool.length){ startRound(); return; }
  missedWords=[]; qIndex=0;
  roundQueue=shuffle(pool).slice(0,ROUND_SIZE);
  $('round-end').classList.remove('show');
  $('game-card').style.display='block';
  $('next-btn').classList.remove('show');
  if(mode==='match') startMatch();
  else showQ();
}

function nextQ(){
  qIndex++;
  $('next-btn').classList.remove('show');
  showQ();
}

function showQ(){
  if(qIndex>=roundQueue.length){ endRound(); return; }
  ['fill','type','scramble','match','build'].forEach(m=>$('mode-'+m).style.display='none');
  $('game-card').classList.toggle('all-practice', mode==='all');
  const item=roundQueue[qIndex];
  if(mode==='all')      showAll(item);
  if(mode==='fill')     showFill(item);
  if(mode==='type')     showType(item);
  if(mode==='scramble') showScramble(item);
  if(mode==='build')    showBuild(item);
}

function showAll(item){
  showFill(item);
  showType(item);
  showScramble(item);
  showBuild(item);
  startMatch({inline:true});
}

// ── Helper: make any element open popup on click ──
function makeClickable(el, nl) {
  el.title = 'Klik voor uitleg';
  el.style.cursor = 'pointer';
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    openPopup(nl);
  });
}

// MODE: FILL IN THE BLANK
// ══════════════════════════════════════════════════════════════
function showFill(item){
  $('mode-fill').style.display='block';
  $('fill-label').textContent=`Invuloefening – ${qIndex+1} van ${roundQueue.length}`;
  buildDots('fill-dots',roundQueue.length,qIndex);
  const answer=oneWordAnswer(item);
  $('fill-topic').textContent=item.topic;
  $('fill-sentence').textContent=blankPrompt(item,'___________');
  $('fill-hint').textContent=`${ui('englishPrefix')}: "${supportMeaning(item)}"`;
  $('fill-translation').style.display='none'; $('fill-translation').textContent='';
  const transBtn=$('fill-trans-btn');
  transBtn.textContent=ui('showTranslation');
  transBtn.style.display='inline-block'; transBtn.disabled=false;
  transBtn.onclick=()=>{
    $('fill-translation').textContent=supportFill(item);
    $('fill-translation').style.display='block';
    transBtn.style.display='none';
  };

  const opts=shuffle([answer,...oneWordDistractors(item)]);
  const cont=$('fill-options'); cont.innerHTML='';
  opts.forEach(w=>{
    const b=document.createElement('button');
    b.className='word-btn'; b.textContent=w;
    b.onclick=()=>handleFill(b,w,item);
    // Long press / right-click for popup
    b.addEventListener('contextmenu',(e)=>{ e.preventDefault(); openPopup(item.nl); });
    cont.appendChild(b);
  });
  // Click the sentence area to open popup for the main word
  makeClickable($('fill-topic'), item.nl);
}

function handleFill(btn,chosen,item){
  document.querySelectorAll('#fill-options .word-btn').forEach(b=>b.classList.add('locked'));
  const answer=oneWordAnswer(item);
  if(chosen===answer){
    btn.classList.add('correct'); handleCorrect(item); markDot('fill-dots',qIndex,'ok');
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('#fill-options .word-btn').forEach(b=>{ if(b.textContent===answer) b.classList.add('reveal'); });
    handleWrong(item); markDot('fill-dots',qIndex,'err');
  }
  // After answering, click sentence to open popup
  makeClickable($('fill-sentence'), item.nl);
  $('next-btn').classList.add('show');
}

// MODE: TYPE

function showType(item){
  $('mode-type').style.display='block';
  $('type-label').textContent=`Typen – ${qIndex+1} van ${roundQueue.length}`;
  buildDots('type-dots',roundQueue.length,qIndex);
  $('type-topic').textContent=item.topic;
  // Make topic tag clickable
  makeClickable($('type-topic'), item.nl);

  $('type-prompt').textContent=blankPrompt(item,'_______');
  $('type-sub').textContent=getTypeInstruction(item);
  const inp=$('type-input');
  inp.value=''; inp.className=''; inp.disabled=false;
  inp.dataset.correct=oneWordAnswer(item); inp.dataset.nl=item.nl;
  $('type-feedback').textContent=''; $('type-feedback').className='type-feedback';
  $('type-hint-btn').textContent='💡 ' + ui('hint');
  $('type-hint-btn').style.display='block';
  $('type-submit-btn').disabled=false;
  inp.onkeydown=e=>{ if(e.key==='Enter') checkType(); };
  setTimeout(()=>inp.focus(),50);
}

function getTypeInstruction(item){
  const tag=(item.tag||'').toLowerCase();
  if(tag.includes('werkwoord + voorzetsel') || tag.includes('scheidbaar werkwoord')) return ui('typeVerb');
  if(tag.includes('uitdrukking') || item.nl.includes(' ')) return ui('typeExpression');
  return ui('typeMissing');
}

function showTypeHint(){
  const correct=$('type-input').dataset.correct;
  const nl=$('type-input').dataset.nl;
  const item=vocab.find(v=>v.nl===nl);
  const desc=item?supportInfoTranslation(item):'';
  const partial=correct.slice(0,Math.ceil(correct.length/2))+'…';
  $('type-feedback').innerHTML=`💡 <strong>${partial}</strong>${desc?' &nbsp;·&nbsp; '+desc:''}`;
  $('type-feedback').className='type-feedback';
}

function checkType(){
  const inp=$('type-input');
  if(inp.disabled) return;
  const typed=inp.value.trim();
  if(!typed) return;
  const correct=inp.dataset.correct;
  const nl=inp.dataset.nl;
  inp.disabled=true; $('type-submit-btn').disabled=true; $('type-hint-btn').style.display='none';
  const item=roundQueue[qIndex];
  if(normalize(typed)===normalize(correct)){
    inp.className='correct';
    $('type-feedback').innerHTML=`✓ Goed! <button style="margin-left:8px;background:none;border:1px solid var(--blue);color:var(--blue);border-radius:12px;padding:2px 10px;font-size:12px;cursor:pointer;" onclick="openPopup('${nl}')">📖 Uitleg</button>`;
    $('type-feedback').className='type-feedback ok';
    handleCorrect(item); markDot('type-dots',qIndex,'ok');
  } else {
    inp.className='wrong';
    $('type-feedback').innerHTML=`✗ Het juiste antwoord is: "<strong>${correct}</strong>" <button style="margin-left:8px;background:none;border:1px solid var(--blue);color:var(--blue);border-radius:12px;padding:2px 10px;font-size:12px;cursor:pointer;" onclick="openPopup('${nl}')">📖 Uitleg</button>`;
    $('type-feedback').className='type-feedback err';
    handleWrong(item); markDot('type-dots',qIndex,'err');
  }
  $('next-btn').classList.add('show');
}

// ══════════════════════════════════════════════════════════════
// MODE: SCRAMBLE
// ══════════════════════════════════════════════════════════════
function showScramble(item){
  $('mode-scramble').style.display='block';
  $('scr-label').textContent=`Puzzel – ${qIndex+1} van ${roundQueue.length}`;
  buildDots('scr-dots',roundQueue.length,qIndex);
  $('scr-topic').textContent=item.topic;
  makeClickable($('scr-topic'), item.nl);
  $('scr-english').textContent = item.fill.replace(item.answer, '___________');
  $('scr-sub').textContent = ui('flag') + ' ' + supportMeaning(item) + ' — ' + ui('spellMissing');
  $('scr-feedback').textContent=''; $('scr-check-btn').disabled=false;
  const word=item.answer.trim().split(/\s+/).pop();
  const isPhrase=false;
  const tiles=shuffle(word.split(''));
  scrState={word,isPhrase,tiles:[...tiles],placed:[],original:[...tiles]};
  renderScramble();
}

function renderScramble(){
  const {tiles,placed,isPhrase,original}=scrState;
  const ac=$('scr-answer'), lc=$('scr-letters');
  ac.innerHTML=''; lc.innerHTML='';
  for(let i=0;i<original.length;i++){
    const el=document.createElement('div');
    el.style.minWidth=isPhrase?'64px':'40px';
    el.className='answer-slot'+(placed[i]!==undefined?' filled':'');
    el.textContent=placed[i]!==undefined?placed[i]:'';
    if(placed[i]!==undefined) el.onclick=()=>removePlaced(i);
    ac.appendChild(el);
  }
  tiles.forEach((t,i)=>{
    const el=document.createElement('div');
    el.style.minWidth=isPhrase?'64px':'40px';
    el.className='letter-tile'+(t===null?' used':'');
    el.textContent=t!==null?t:'';
    if(t!==null) el.onclick=()=>placeTile(i);
    lc.appendChild(el);
  });
}

function placeTile(i){
  let slot=-1;
  for(let j=0;j<scrState.original.length;j++){ if(scrState.placed[j]===undefined){slot=j;break;} }
  if(slot===-1) return;
  scrState.placed[slot]=scrState.tiles[i];
  scrState.tiles[i]=null;
  renderScramble();
}

function removePlaced(i){
  const letter=scrState.placed[i];
  scrState.placed[i]=undefined;
  const fi=scrState.tiles.indexOf(null);
  if(fi!==-1) scrState.tiles[fi]=letter; else scrState.tiles.push(letter);
  renderScramble();
}

function clearScramble(){
  scrState.tiles=shuffle([...scrState.original]);
  scrState.placed=[];
  $('scr-feedback').textContent=''; $('scr-check-btn').disabled=false;
  renderScramble();
}

function checkScramble(){
  const {placed,word,isPhrase}=scrState;
  if(placed.filter(v=>v!==undefined).length<scrState.original.length){ $('scr-feedback').textContent=ui('allSlots'); return; }
  const attempt=placed.join(isPhrase?' ':'');
  $('scr-check-btn').disabled=true;
  const slots=$('scr-answer').querySelectorAll('.answer-slot');
  const item=roundQueue[qIndex];
  const nl=item.nl;
  if(normalize(attempt)===normalize(word)){
    slots.forEach(s=>s.classList.add('correct-slot'));
    $('scr-feedback').innerHTML=`✓ Goed! <button style="margin-left:8px;background:none;border:1px solid var(--blue);color:var(--blue);border-radius:12px;padding:2px 10px;font-size:12px;cursor:pointer;" onclick="openPopup('${nl}')">📖 Uitleg</button>`;
    $('scr-feedback').className='type-feedback ok';
    handleCorrect(item); markDot('scr-dots',qIndex,'ok');
  } else {
    slots.forEach(s=>s.classList.add('wrong-slot'));
    $('scr-feedback').innerHTML=`✗ Correct: "<strong>${word}</strong>" <button style="margin-left:8px;background:none;border:1px solid var(--blue);color:var(--blue);border-radius:12px;padding:2px 10px;font-size:12px;cursor:pointer;" onclick="openPopup('${nl}')">📖 Uitleg</button>`;
    $('scr-feedback').className='type-feedback err';
    handleWrong(item); markDot('scr-dots',qIndex,'err');
  }
  $('scr-letters').querySelectorAll('.letter-tile').forEach(t=>t.onclick=null);
  $('next-btn').classList.add('show');
}

// ══════════════════════════════════════════════════════════════
// MODE: MATCHING
// ══════════════════════════════════════════════════════════════
function startMatch(options={}){
  if(!options.inline) ['fill','type','scramble','build'].forEach(m=>$('mode-'+m).style.display='none');
  $('mode-match').style.display='block';
  $('next-btn').classList.remove('show');
  const items=options.inline ? shuffle([roundQueue[qIndex], ...vocab.filter(v=>v.nl!==roundQueue[qIndex].nl)]).slice(0,6) : shuffle(vocab).slice(0,6);
  matchPairs=items; matchSelected=null; matchDone=0;
  buildDots('match-dots',items.length,0);
  const left=shuffle([...items]), right=shuffle([...items]);
  $('match-left').innerHTML=''; $('match-right').innerHTML='';
  left.forEach(item=>{
    const el=document.createElement('div');
    el.className='match-item'; el.textContent=item.nl;
    el.dataset.key=item.nl; el.dataset.side='L';
    // Single click: select for matching. Long press / secondary action: popup
    el.addEventListener('click', ()=>handleMatch(el));
    el.addEventListener('contextmenu',(e)=>{ e.preventDefault(); openPopup(item.nl); });
    $('match-left').appendChild(el);
  });
  right.forEach(item=>{
    const el=document.createElement('div');
    el.className='match-item'; el.textContent=supportMeaning(item);
    el.dataset.key=item.nl; el.dataset.side='R';
    el.onclick=()=>handleMatch(el);
    $('match-right').appendChild(el);
  });
}

function handleMatch(el){
  if(el.classList.contains('locked')||el.classList.contains('matched-correct')) return;
  if(!matchSelected){ matchSelected=el; el.classList.add('selected'); return; }
  const first=matchSelected, second=el;
  matchSelected=null; first.classList.remove('selected');
  if(first.dataset.side===second.dataset.side){ second.classList.add('selected'); matchSelected=second; return; }
  if(first.dataset.key===second.dataset.key){
    [first,second].forEach(e=>e.classList.add('matched-correct','locked'));
    // Add popup button on matched Dutch word
    const nlEl=first.dataset.side==='L'?first:second;
    const infoBtn=document.createElement('span');
    infoBtn.textContent=' 📖';
    infoBtn.style.cursor='pointer';
    infoBtn.onclick=(e)=>{ e.stopPropagation(); openPopup(nlEl.dataset.key); };
    nlEl.appendChild(infoBtn);
    matchDone++;
    const item=vocab.find(v=>v.nl===first.dataset.key);
    if(item) handleCorrect(item);
    const dots=$('match-dots').querySelectorAll('.dot');
    if(dots[matchDone-1]) dots[matchDone-1].className='dot ok';
    if(dots[matchDone])   dots[matchDone].className='dot cur';
    if(matchDone===matchPairs.length) {
      if(mode==='all') $('next-btn').classList.add('show');
      else setTimeout(endRound,600);
    }
  } else {
    [first,second].forEach(e=>{ e.classList.add('flash-wrong'); setTimeout(()=>e.classList.remove('flash-wrong'),600); });
    const item=vocab.find(v=>v.nl===first.dataset.key);
    if(item) handleWrong(item);
  }
}

// ══════════════════════════════════════════════════════════════
// MODE: SENTENCE BUILD
// ══════════════════════════════════════════════════════════════
function showBuild(item){
  $('mode-build').style.display='block';
  $('build-label').textContent=`Zinsbouw – ${qIndex+1} van ${roundQueue.length}`;
  buildDots('build-dots',roundQueue.length,qIndex);
  $('build-english').textContent='"'+supportSentence(item)+'"';
  makeClickable($('build-english'), item.nl);
  $('build-result').textContent=''; $('build-result').className='sb-result';
  buildState={words:item.sentence.words, placed:[], shuffled:shuffle([...item.sentence.words])};
  renderBuild();
}

function renderBuild(){
  const {shuffled,placed}=buildState;
  const zone=$('build-zone'), bank=$('build-bank');
  zone.innerHTML=''; bank.innerHTML='';
  placed.forEach((w,i)=>{
    const c=document.createElement('div');
    c.className='word-chip in-zone'; c.textContent=w;
    c.onclick=()=>removeBuildWord(i);
    zone.appendChild(c);
  });
  shuffled.forEach((w,i)=>{
    if(w===null) return;
    const c=document.createElement('div');
    c.className='word-chip'; c.textContent=w;
    c.onclick=()=>addBuildWord(i);
    bank.appendChild(c);
  });
}

function addBuildWord(i){ buildState.placed.push(buildState.shuffled[i]); buildState.shuffled[i]=null; $('build-result').textContent=''; renderBuild(); }
function removeBuildWord(i){
  const w=buildState.placed[i]; buildState.placed.splice(i,1);
  const ni=buildState.shuffled.indexOf(null);
  if(ni!==-1) buildState.shuffled[ni]=w; else buildState.shuffled.push(w);
  $('build-result').textContent=''; renderBuild();
}
function clearBuild(){ buildState.placed=[]; buildState.shuffled=shuffle([...buildState.words]); $('build-result').textContent=''; renderBuild(); }
function checkBuild(){
  const {placed,words}=buildState;
  if(placed.length<words.length){ $('build-result').textContent=ui('incompleteSentence'); return; }
  const item=roundQueue[qIndex];
  const attempt=placed.join(' '), correct=words.join(' ');
  $('build-zone').querySelectorAll('.word-chip').forEach(c=>c.classList.add('locked'));
  $('build-bank').querySelectorAll('.word-chip').forEach(c=>c.classList.add('locked'));
  if(normalize(attempt)===normalize(correct)){
    $('build-zone').querySelectorAll('.word-chip').forEach(c=>c.classList.add('correct-chip'));
    $('build-result').innerHTML=`✓ Goed! <button style="margin-left:8px;background:none;border:1px solid var(--blue);color:var(--blue);border-radius:12px;padding:2px 10px;font-size:12px;cursor:pointer;" onclick="openPopup('${item.nl}')">📖 Uitleg</button>`;
    $('build-result').className='sb-result ok';
    handleCorrect(item); markDot('build-dots',qIndex,'ok');
  } else {
    $('build-zone').querySelectorAll('.word-chip').forEach(c=>c.classList.add('wrong-chip'));
    $('build-result').innerHTML=`✗ Correct: "<strong>${correct}</strong>" <button style="margin-left:8px;background:none;border:1px solid var(--blue);color:var(--blue);border-radius:12px;padding:2px 10px;font-size:12px;cursor:pointer;" onclick="openPopup('${item.nl}')">📖 Uitleg</button>`;
    $('build-result').className='sb-result err';
    handleWrong(item); markDot('build-dots',qIndex,'err');
  }
  $('next-btn').classList.add('show');
}

// ══════════════════════════════════════════════════════════════
// FEEDBACK & SCORING
// ══════════════════════════════════════════════════════════════
function handleCorrect(item){
  streak++; xp+=(streak>=5?20:10);
  updateHUD(); flashEmoji('✅');
  if(streak===3)  showToast('🔥 3 op rij!');
  if(streak===5)  { showToast('⚡ 5 op rij! +20 XP!'); confetti(); }
  if(streak===10) { showToast('🏆 10 op rij!!!'); confetti(); }
}
function handleWrong(item){
  if(streak>=3) showToast(`💔 Streak van ${streak} voorbij!`);
  streak=0; missedWords.push(item); updateHUD(); flashEmoji('❌');
}
function updateHUD(){
  $('hud-xp').textContent=xp; $('hud-streak').textContent=streak+'🔥';
  $('xp-bar').style.width=(xp%100)+'%';
}
function flashEmoji(e){
  const el=$('feedback-flash'); el.textContent=e; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),500);
}
function showToast(msg){
  const t=$('streak-toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function confetti(){
  const cols=['#1a4f8a','#f9a825','#e53935','#43a047','#ab47bc','#00acc1'];
  for(let i=0;i<40;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw'; el.style.top='-20px';
    el.style.background=cols[Math.floor(Math.random()*cols.length)];
    el.style.animationDelay=(Math.random()*.5)+'s';
    document.body.appendChild(el); setTimeout(()=>el.remove(),1500);
  }
}

// ══════════════════════════════════════════════════════════════
// ROUND END
// ══════════════════════════════════════════════════════════════
function endRound(){
  $('game-card').style.display='none';
  $('next-btn').classList.remove('show');
  const end=$('round-end'); end.classList.add('show');
  const total=roundQueue.length||matchPairs.length;
  const wrong=missedWords.length, right=total-wrong;
  const pct=Math.round((right/total)*100);
  let emoji='🎉',title='Uitstekend!';
  if(pct<50){emoji='💪';title='Blijf oefenen!';}
  else if(pct<80){emoji='👍';title='Goed gedaan!';}
  else if(pct===100){confetti();title='Perfect! 🏆';}
  $('end-emoji').textContent=emoji; $('end-title').textContent=title;
  $('end-sub').textContent=`${right} van de ${total} goed – ${pct}%`;
  const ml=$('missed-list');
  if(wrong>0){
    ml.style.display='block';
    $('missed-items').innerHTML=missedWords.map(w=>`<li><button style="background:none;border:none;cursor:pointer;color:var(--blue);text-decoration:underline;font-size:14px;" onclick="openPopup('${w.nl}')"><strong>${w.nl}</strong></button> = ${supportMeaning(w)}</li>`).join('');
  } else { ml.style.display='none'; }
}

async function loadVocab(){
  const res = await fetch('vocab.json');
  vocab = await res.json();
  startRound();
}

loadVocab();
</script>
